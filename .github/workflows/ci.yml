# SPDX-License-Identifier: GPL-3.0-only
#
# pkg-framework CI. Runs on every push to main and every PR.
#
# Jobs:
#   lint      shellcheck + em-dash gate + markdown sanity
#   test      bash unit suite on Ubuntu (bash 5)
#   bash4     same unit suite under bash 4 to catch portability drift
#   smoke     end-to-end scaffold + verify + drift + sync round trip
#
# All four must pass for a PR to merge. Smoke is the gate that proves
# the onboarding story still works without anyone having to scaffold a
# real project.

name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: shellcheck (warning+)
        run: make lint-shell
      - name: em-dash gate
        run: make lint-voice
      - name: markdown sanity
        run: make lint-docs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash version
        run: bash --version | head -1
      - name: unit tests
        run: make test

  bash4:
    runs-on: ubuntu-latest
    container:
      image: bash:4.4
    steps:
      - uses: actions/checkout@v4
      - name: bash version
        run: bash --version | head -1
      - name: install coreutils + findutils
        run: apk add --no-cache coreutils findutils gawk grep sed
      - name: unit tests (bash 4.4)
        run: make test

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: end-to-end onboarding smoke
        run: make smoke
